<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Волна — Музыка</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Onest:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{--bg:#07090f;--s1:#0f1320;--s2:#161d2e;--s3:#1c2538;--border:rgba(100,120,210,0.12);--a1:#3b82f6;--a2:#8b5cf6;--a3:#a855f7;--text:#f0f4ff;--text2:#8a9bbf;--text3:#435070;--grad:linear-gradient(135deg,#3b82f6,#8b5cf6);--grad2:linear-gradient(135deg,#f97316,#ef4444);--fd:'Unbounded',sans-serif;--fb:'Onest',sans-serif;--r:14px;--ph:72px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:var(--fb);background:var(--bg);color:var(--text);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 10% 15%,rgba(59,130,246,.07) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 90% 75%,rgba(139,92,246,.06) 0%,transparent 60%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:99px}
#app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:1fr var(--ph);grid-template-areas:"side main" "player player";height:100vh;position:relative;z-index:1}
#sidebar{grid-area:side;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding-bottom:16px}
.logo{display:flex;align-items:center;gap:10px;padding:20px 16px 18px;border-bottom:1px solid var(--border);margin-bottom:8px}
.logo-mark{width:34px;height:34px;background:var(--grad);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 4px 14px rgba(59,130,246,.3);flex-shrink:0}
.logo-text{font-family:var(--fd);font-size:16px;font-weight:700;letter-spacing:-.5px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;flex-direction:column;gap:2px;padding:4px 10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;user-select:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--s2);color:var(--text);transform:translateX(2px)}
.nav-item.active{background:linear-gradient(135deg,rgba(59,130,246,.13),rgba(139,92,246,.08));color:var(--text);border-color:rgba(99,102,241,.2)}
.nav-icon{font-size:17px;width:20px;text-align:center;flex-shrink:0}
.sec-label{font-family:var(--fd);font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:16px 22px 7px}
.pl-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:0 10px;border-radius:9px;cursor:pointer;transition:background .15s}
.pl-item:hover{background:var(--s2)}
.pl-thumb{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.pl-name{font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-item:hover .pl-name{color:var(--text)}
.pl-count{font-size:10px;color:var(--text3)}
#main{grid-area:main;overflow-y:auto;padding:26px 28px 20px}
.hero{position:relative;border-radius:22px;padding:32px;overflow:hidden;margin-bottom:28px;background:linear-gradient(135deg,#150830 0%,#0e1530 45%,#091525 100%);border:1px solid rgba(139,92,246,.18)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 70% at 70% 50%,rgba(139,92,246,.14) 0%,transparent 70%),radial-gradient(ellipse 50% 80% at 5% 30%,rgba(59,130,246,.1) 0%,transparent 60%)}
.hero-tag{display:inline-flex;align-items:center;gap:6px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--a3);background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.22);padding:4px 11px;border-radius:999px;margin-bottom:14px;position:relative}
.hero-tag::before{content:'';width:5px;height:5px;background:var(--a3);border-radius:50%;animation:pulse 2s infinite}
.hero-title{font-family:var(--fd);font-size:clamp(22px,3.5vw,36px);font-weight:700;letter-spacing:-1.2px;line-height:1.05;margin-bottom:10px;position:relative;max-width:460px}
.hero-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:22px;max-width:360px;position:relative}
.hero-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;background:var(--grad2);color:#fff;border:none;border-radius:999px;font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer;transition:all .25s;box-shadow:0 6px 20px rgba(249,115,22,.32);position:relative}
.hero-btn:hover{transform:scale(1.05) translateY(-1px)}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.sec-title{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:-.3px}
.sec-more{font-size:11px;color:#7ca5ff;cursor:pointer;background:none;border:none;opacity:.7;transition:opacity .15s;font-family:var(--fb)}
.sec-more:hover{opacity:1}
.sec-mb{margin-bottom:30px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.card{background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:12px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.06),transparent);opacity:0;transition:opacity .25s;border-radius:16px}
.card:hover{transform:translateY(-4px);border-color:rgba(99,102,241,.28);box-shadow:0 14px 36px rgba(0,0,0,.45)}
.card:hover::before{opacity:1}
.card-cover{width:100%;aspect-ratio:1;border-radius:10px;overflow:hidden;margin-bottom:10px;background:var(--s3);display:flex;align-items:center;justify-content:center;transition:transform .25s;position:relative}
.card:hover .card-cover{transform:scale(1.02)}
.card-cover img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.card-play{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;border-radius:10px}
.card:hover .card-play{opacity:1}
.card-play-btn{width:40px;height:40px;background:var(--grad);border:none;border-radius:50%;color:#fff;font-size:14px;cursor:pointer;padding-left:2px;box-shadow:0 6px 20px rgba(99,102,241,.5)}
.card-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.card-sub{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tracks{display:flex;flex-direction:column;gap:2px}
.track{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:background .15s}
.track:hover{background:var(--s2)}
.track.playing{background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(139,92,246,.05))}
.track-left{display:flex;align-items:center;gap:10px;min-width:0}
.track-num{font-size:12px;color:var(--text3);width:20px;text-align:center;flex-shrink:0}
.track.playing .track-num{color:var(--a1)}
.track-cover{width:40px;height:40px;border-radius:7px;flex-shrink:0;background:var(--s3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.track-cover img{width:100%;height:100%;object-fit:cover;border-radius:7px}
.track-info{min-width:0;overflow:hidden}
.track-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.track.playing .track-name{color:var(--a1)}
.track-artist{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.track-dur{font-size:12px;color:var(--text3)}
.track-like{background:none;border:none;font-size:15px;cursor:pointer;color:var(--text3);padding:4px;opacity:0;transition:all .15s}
.track:hover .track-like{opacity:1}
.track-like.liked{opacity:1;color:#ef4444}
.eq{display:flex;align-items:flex-end;gap:2px;height:14px;width:20px;justify-content:center}
.eq span{width:2.5px;background:var(--a1);border-radius:2px;height:3px}
.eq.on span{animation:eq .8s ease infinite}
.eq.on span:nth-child(2){animation-delay:.15s}
.eq.on span:nth-child(3){animation-delay:.3s}
.eq.on span:nth-child(4){animation-delay:.1s}
.eq.on span:nth-child(5){animation-delay:.25s}
.search-wrap{margin-bottom:22px;position:relative}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.search-inp{width:100%;padding:13px 16px 13px 46px;background:var(--s2);border:1px solid var(--border);border-radius:999px;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;transition:all .25s}
.search-inp::placeholder{color:var(--text3)}
.search-inp:focus{border-color:rgba(99,102,241,.45);background:var(--s3);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.genre-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.genre-tile{aspect-ratio:3/2;border-radius:var(--r);padding:14px;display:flex;align-items:flex-end;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s}
.genre-tile:hover{transform:scale(1.03)}
.genre-name{font-family:var(--fd);font-size:12px;font-weight:700;color:#fff;position:relative;z-index:1}
.genre-emoji{position:absolute;right:-8px;top:-8px;font-size:44px;opacity:.5;transform:rotate(-15deg);transition:transform .2s}
.genre-tile:hover .genre-emoji{transform:rotate(-5deg) scale(1.15)}
#player{grid-area:player;position:relative;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 20px;gap:12px;background:rgba(10,14,25,.9);backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:100}
#player::before{content:'';position:absolute;top:0;left:0;width:var(--prog,0%);height:2px;background:var(--grad);transition:width .5s linear}
.p-track{display:flex;align-items:center;gap:10px;min-width:0}
.p-cover{width:46px;height:46px;border-radius:8px;flex-shrink:0;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.p-cover img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.p-info{min-width:0}
.p-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.p-artist{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-like{background:none;border:none;font-size:17px;color:var(--text3);cursor:pointer;padding:4px;flex-shrink:0;transition:all .15s}
.p-like:hover{transform:scale(1.25);color:#ef4444}
.p-like.liked{color:#ef4444}
.p-controls{display:flex;flex-direction:column;align-items:center;gap:6px}
.p-btns{display:flex;align-items:center;gap:2px}
.cbtn{width:34px;height:34px;background:none;border:none;border-radius:50%;color:var(--text2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cbtn:hover{color:var(--text);background:var(--s3)}
.cbtn.on{color:var(--a1)}
.cbtn-play{width:42px;height:42px;background:var(--grad);color:#fff;font-size:16px;padding-left:2px;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.cbtn-play:hover{transform:scale(1.08)}
.p-prog{display:flex;align-items:center;gap:8px;width:320px}
.p-time{font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums;min-width:28px}
.p-time.r{text-align:right}
.prog-bar{flex:1;height:4px;background:var(--s3);border-radius:99px;cursor:pointer;position:relative;overflow:hidden;transition:height .15s}
.prog-bar:hover{height:6px}
.prog-fill{height:100%;background:var(--grad);border-radius:99px;position:relative}
.prog-fill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;background:#fff;border-radius:50%;opacity:0;transition:opacity .15s}
.prog-bar:hover .prog-fill::after{opacity:1}
.p-right{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.vol-bar{width:76px;height:4px;background:var(--s3);border-radius:99px;cursor:pointer;overflow:hidden}
.vol-fill{height:100%;background:var(--grad);border-radius:99px}
.badge{display:inline-block;font-size:9px;font-weight:700;background:rgba(59,130,246,.2);color:var(--a1);border:1px solid rgba(59,130,246,.3);border-radius:4px;padding:1px 5px;margin-left:4px;vertical-align:middle}
.empty{display:flex;flex-direction:column;align-items:center;padding:52px 20px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:14px;opacity:.3}
.empty-title{font-family:var(--fd);font-size:16px;font-weight:600;margin-bottom:7px}
.empty-sub{font-size:13px;color:var(--text2);max-width:260px;line-height:1.6}
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.page{animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}
@keyframes eq{0%,100%{height:3px}50%{height:13px}}

@media(max-width:768px){
  :root{--ph:130px}
  #app{grid-template-columns:1fr;grid-template-rows:1fr var(--ph);grid-template-areas:"main" "player"}
  #sidebar{display:none}
  #main{padding:14px 14px 10px}
  #player{grid-template-columns:1fr;grid-template-rows:auto auto;padding:10px 14px 12px;gap:8px;height:var(--ph);align-content:center}
  #player::before{display:none}
  .p-right{display:none}
  .p-prog{width:100%}
  .mob-nav{position:sticky;top:0;z-index:50;background:rgba(10,14,25,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;padding:8px 12px;gap:4px;margin:-14px -14px 16px}
  .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:9px;background:none;border:none;color:var(--text3);cursor:pointer;font-family:var(--fb);font-size:10px;font-weight:500;transition:color .15s}
  .mob-tab.active{color:var(--a1)}
  .mob-tab-icon{font-size:20px}
  .hero{padding:22px 18px}
  .hero-title{font-size:22px}
  .hero-sub{display:none}
  .cards{grid-template-columns:repeat(2,1fr);gap:10px}
  .genre-grid{grid-template-columns:repeat(2,1fr)}
  .track{padding:9px 6px}
  .track-num{display:none}
  .track-dur{display:none}
  .track-like{opacity:1}
}
</style>
</head>
<body>
<div id="app">
<aside id="sidebar">
  <div class="logo"><div class="logo-mark">🌊</div><span class="logo-text">Волна</span></div>
  <nav class="nav">
    <button class="nav-item active" data-page="home"><span class="nav-icon">🏠</span>Главная</button>
    <button class="nav-item" data-page="search"><span class="nav-icon">🔍</span>Поиск</button>
    <button class="nav-item" data-page="catalog"><span class="nav-icon">🎵</span>Каталог</button>
    <button class="nav-item" data-page="liked"><span class="nav-icon">❤️</span>Любимые</button>
  </nav>
  <div class="sec-label">Плейлисты</div>
  <div id="pl-sidebar"></div>
</aside>
<main id="main">
  <div class="mob-nav">
    <button class="mob-tab active" data-page="home"><span class="mob-tab-icon">🏠</span>Главная</button>
    <button class="mob-tab" data-page="search"><span class="mob-tab-icon">🔍</span>Поиск</button>
    <button class="mob-tab" data-page="catalog"><span class="mob-tab-icon">🎵</span>Каталог</button>
    <button class="mob-tab" data-page="liked"><span class="mob-tab-icon">❤️</span>Любимые</button>
  </div>
  <div id="page-content"></div>
</main>
<footer id="player">
  <div class="p-track">
    <div class="p-cover" id="p-cover">🎵</div>
    <div class="p-info"><div class="p-title" id="p-title">Выберите трек</div><div class="p-artist" id="p-artist">—</div></div>
    <button class="p-like" id="p-like">🤍</button>
  </div>
  <div class="p-controls">
    <div class="p-btns">
      <button class="cbtn" id="btn-shuffle">⇌</button>
      <button class="cbtn" id="btn-prev">⏮</button>
      <button class="cbtn cbtn-play" id="btn-play">▶</button>
      <button class="cbtn" id="btn-next">⏭</button>
      <button class="cbtn" id="btn-repeat">↻</button>
    </div>
    <div class="p-prog">
      <span class="p-time" id="p-cur">0:00</span>
      <div class="prog-bar" id="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="p-time r" id="p-dur">0:00</span>
    </div>
  </div>
  <div class="p-right">
    <button class="cbtn" id="btn-mute">🔊</button>
    <div class="vol-bar" id="vol-bar"><div class="vol-fill" id="vol-fill" style="width:70%"></div></div>
  </div>
</footer>
</div>
<audio id="audio" preload="none"></audio>
<script>
const PROXY = 'https://api.allorigins.win/raw?url=';
const DZ = 'https://api.deezer.com';
const audio = document.getElementById('audio');
const LIKED = new Set(JSON.parse(localStorage.getItem('liked')||'[]'));
const HISTORY = [];
const $ = id => document.getElementById(id);
const qsa = (s,el=document) => [...el.querySelectorAll(s)];
const fmtS = s => { s=Math.floor(s||0); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };
const fmtMs = ms => fmtS((ms||0)/1000);
const saveLiked = () => localStorage.setItem('liked', JSON.stringify([...LIKED]));

const ST = { page:'home', track:null, queue:[], qi:0, playing:false, shuffle:false, repeat:false, muted:false, vol:0.7, search:'', stimer:null };

// DEEZER
async function dz(path) {
  try {
    const r = await fetch(PROXY + encodeURIComponent(DZ + path));
    return await r.json();
  } catch { return {}; }
}

const dzChart = () => dz('/chart/0/tracks?limit=15').then(d => (d.data||[]).map(t2l));
const dzAlbums = () => dz('/chart/0/albums?limit=6').then(d => (d.data||[]).map(a2l));
const dzSearch = q => dz(`/search?q=${encodeURIComponent(q)}&limit=20`).then(d => (d.data||[]).map(t2l));
const dzGenre = id => dz(`/chart/${id}/tracks?limit=15`).then(d => (d.data||[]).map(t2l));
const dzAlbumTracks = id => dz(`/album/${id}/tracks?limit=20`).then(d => (d.data||[]).map(t2l));

function t2l(t) {
  return { id:t.id, title:t.title||t.name, artist:t.artist?.name||'—', album:t.album?.title||'', duration:(t.duration||0)*1000, preview:t.preview, image:t.album?.cover_medium||t.album?.cover_small, liked:LIKED.has(t.id) };
}
function a2l(a) {
  return { id:a.id, title:a.title, artist:a.artist?.name||'—', image:a.cover_medium||a.cover_small };
}

// AUDIO
audio.volume = ST.vol;
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const p = (audio.currentTime/audio.duration)*100;
  $('prog-fill').style.width = p+'%';
  document.documentElement.style.setProperty('--prog', p+'%');
  $('p-cur').textContent = fmtS(audio.currentTime);
});
audio.addEventListener('ended', () => { if (ST.repeat) { audio.currentTime=0; audio.play(); } else next(); });
audio.addEventListener('play', () => { ST.playing=true; $('btn-play').textContent='⏸'; qsa('.eq').forEach(e=>e.classList.toggle('on', e.dataset.id==ST.track?.id)); });
audio.addEventListener('pause', () => { ST.playing=false; $('btn-play').textContent='▶'; qsa('.eq').forEach(e=>e.classList.remove('on')); });

function play(track, queue=[track]) {
  ST.track=track; ST.queue=queue; ST.qi=queue.findIndex(t=>t.id===track.id);
  HISTORY.unshift(track);
  if (track.preview) { audio.src=track.preview; audio.play().catch(()=>{}); }
  else { audio.pause(); audio.src=''; ST.playing=false; $('btn-play').textContent='▶'; }
  updateP();
}

function next() {
  if (!ST.queue.length) return;
  ST.qi = ST.shuffle ? Math.floor(Math.random()*ST.queue.length) : (ST.qi+1)%ST.queue.length;
  play(ST.queue[ST.qi], ST.queue);
}

function prev() {
  if (audio.currentTime > 3) { audio.currentTime=0; return; }
  ST.qi = (ST.qi-1+ST.queue.length)%ST.queue.length;
  play(ST.queue[ST.qi], ST.queue);
}

function updateP() {
  const t = ST.track; if (!t) return;
  $('p-cover').innerHTML = t.image ? `<img src="${t.image}" />` : '🎵';
  $('p-title').textContent = t.title;
  $('p-artist').textContent = t.artist;
  $('p-dur').textContent = fmtMs(t.duration);
  $('p-like').className = 'p-like'+(LIKED.has(t.id)?' liked':'');
  $('p-like').textContent = LIKED.has(t.id)?'❤️':'🤍';
}

function toggleLike(id, track) {
  LIKED.has(id) ? LIKED.delete(id) : LIKED.add(id);
  saveLiked();
  if (ST.track?.id===id) updateP();
  qsa(`.track-like[data-id="${id}"]`).forEach(b => { b.className='track-like'+(LIKED.has(id)?' liked':''); b.textContent=LIKED.has(id)?'❤️':'🤍'; });
}

// COMPONENTS
function cardH(a) {
  const img = a.image ? `<img src="${a.image}" loading="lazy" />` : '<span style="font-size:40px">🎵</span>';
  return `<div class="card" data-aid="${a.id}"><div class="card-cover">${img}<div class="card-play"><button class="card-play-btn">▶</button></div></div><div class="card-title">${a.title}</div><div class="card-sub">${a.artist}</div></div>`;
}

function trackH(t, i, q) {
  const isP = ST.track?.id===t.id;
  const num = isP ? `<div class="eq ${ST.playing?'on':''}" data-id="${t.id}"><span></span><span></span><span></span><span></span><span></span></div>` : `<span style="font-size:11px;color:var(--text3)">${i+1}</span>`;
  const img = t.image ? `<img src="${t.image}" loading="lazy" />` : '🎵';
  return `<div class="track${isP?' playing':''}" data-id="${t.id}"><div class="track-left"><div class="track-num">${num}</div><div class="track-cover">${img}</div><div class="track-info"><div class="track-name">${t.title}</div><div class="track-artist">${t.artist}${t.album?' · '+t.album:''}</div></div></div><div class="track-right"><span class="track-dur">${fmtMs(t.duration)}</span><button class="track-like${LIKED.has(t.id)?' liked':''}" data-id="${t.id}">${LIKED.has(t.id)?'❤️':'🤍'}</button></div></div>`;
}

function skelC(n=6) { return Array(n).fill('<div class="skel" style="aspect-ratio:1;border-radius:16px"></div>').join(''); }
function skelT(n=8) { return Array(n).fill('<div class="skel" style="height:54px;margin-bottom:2px;border-radius:9px"></div>').join(''); }

// NAV
function goTo(page) {
  ST.page=page;
  qsa('[data-page]').forEach(e=>e.classList.toggle('active',e.dataset.page===page));
  render();
}

function render() {
  const el=$('page-content'); el.className='page';
  if (ST.page==='home') renderHome(el);
  else if (ST.page==='search') renderSearch(el);
  else if (ST.page==='catalog') renderCatalog(el);
  else if (ST.page==='liked') renderLiked(el);
}

// PAGES
async function renderHome(el) {
  el.innerHTML = `
    <div class="hero">
      <div class="hero-tag">✦ Чарт дня</div>
      <div class="hero-title">Мировые хиты прямо сейчас</div>
      <div class="hero-sub">Топ треков по версии Deezer — обновляется каждый день.</div>
      <button class="hero-btn" id="hero-play">▶ Слушать</button>
    </div>
    <div class="sec-mb"><div class="sec-head"><span class="sec-title">Популярные альбомы</span></div><div class="cards" id="h-albums">${skelC()}</div></div>
    <div class="sec-mb"><div class="sec-head"><span class="sec-title">Топ треков <span class="badge">30 сек превью</span></span></div><div class="tracks" id="h-tracks">${skelT()}</div></div>`;
  bindNav();
  const [albums, tracks] = await Promise.all([dzAlbums(), dzChart()]);
  if (!$('h-albums')) return;
  $('h-albums').innerHTML = albums.map(cardH).join('');
  $('h-tracks').innerHTML = tracks.map((t,i)=>trackH(t,i,tracks)).join('');
  bindTracks(tracks); bindAlbums();
  $('hero-play')?.addEventListener('click', ()=>{ if(tracks.length) play(tracks[0],tracks); });
}

function renderSearch(el) {
  el.innerHTML = `
    <div class="sec-head" style="margin-bottom:20px"><span class="sec-title">Поиск</span></div>
    <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-inp" id="s-inp" placeholder="Трек, исполнитель…" value="${ST.search}" /></div>
    <div id="s-res">${ST.search ? skelT(5) : genresH()}</div>`;
  bindNav();
  const inp = $('s-inp');
  if (inp) {
    inp.addEventListener('input', e => {
      ST.search = e.target.value;
      clearTimeout(ST.stimer);
      if (!ST.search) { $('s-res').innerHTML=genresH(); bindGenres(); return; }
      $('s-res').innerHTML = skelT(5);
      ST.stimer = setTimeout(()=>doSearch(ST.search), 500);
    });
    setTimeout(()=>inp.focus(), 50);
  }
  bindGenres();
  if (ST.search) doSearch(ST.search);
}

async function doSearch(q) {
  const tracks = await dzSearch(q);
  const res = $('s-res'); if (!res) return;
  res.innerHTML = tracks.length
    ? `<div class="tracks">${tracks.map((t,i)=>trackH(t,i,tracks)).join('')}</div>`
    : `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Ничего не найдено</div></div>`;
  bindTracks(tracks);
}

function genresH() {
  const G = [{n:'Поп',e:'🎤',c:'linear-gradient(135deg,#f97316,#ef4444)',id:132},{n:'Хип-хоп',e:'🎧',c:'linear-gradient(135deg,#8b5cf6,#6366f1)',id:116},{n:'Рок',e:'🎸',c:'linear-gradient(135deg,#374151,#111827)',id:152},{n:'Электро',e:'⚡',c:'linear-gradient(135deg,#ec4899,#8b5cf6)',id:106},{n:'Джаз',e:'🎷',c:'linear-gradient(135deg,#d97706,#b45309)',id:129},{n:'R&B',e:'🎹',c:'linear-gradient(135deg,#059669,#0891b2)',id:165},{n:'Инди',e:'🌿',c:'linear-gradient(135deg,#06b6d4,#3b82f6)',id:197},{n:'Классика',e:'🎻',c:'linear-gradient(135deg,#78716c,#44403c)',id:98}];
  return `<div class="genre-grid">${G.map(g=>`<div class="genre-tile" style="background:${g.c}" data-gid="${g.id}"><span class="genre-name">${g.n}</span><span class="genre-emoji">${g.e}</span></div>`).join('')}</div>`;
}

function bindGenres() {
  qsa('[data-gid]').forEach(el => {
    el.onclick = async () => {
      const res = $('s-res'); if (res) res.innerHTML = skelT(5);
      const tracks = await dzGenre(el.dataset.gid);
      if (!res) return;
      res.innerHTML = tracks.length ? `<div class="tracks">${tracks.map((t,i)=>trackH(t,i,tracks)).join('')}</div>` : `<div class="empty"><div class="empty-icon">🎵</div><div class="empty-title">Нет треков</div></div>`;
      bindTracks(tracks);
    };
  });
}

async function renderCatalog(el) {
  el.innerHTML = `
    <div class="sec-head" style="margin-bottom:20px"><span class="sec-title">Каталог</span></div>
    <div class="sec-mb"><div class="sec-head"><span class="sec-title">Альбомы</span></div><div class="cards" id="c-albums">${skelC()}</div></div>
    <div class="sec-mb"><div class="sec-head"><span class="sec-title">Все треки <span class="badge">30 сек</span></span></div><div class="tracks" id="c-tracks">${skelT()}</div></div>`;
  bindNav();
  const [albums, tracks] = await Promise.all([dzAlbums(), dzChart()]);
  if (!$('c-albums')) return;
  $('c-albums').innerHTML = albums.map(cardH).join('');
  $('c-tracks').innerHTML = tracks.map((t,i)=>trackH(t,i,tracks)).join('');
  bindTracks(tracks); bindAlbums();
}

function renderLiked(el) {
  const seen = new Set();
  const liked = HISTORY.filter(t=>{ if(!LIKED.has(t.id)||seen.has(t.id)) return false; seen.add(t.id); return true; });
  el.innerHTML = `
    <div style="background:linear-gradient(135deg,#1a0533,#0f0f2e);border-radius:20px;padding:28px;margin-bottom:24px;border:1px solid rgba(168,85,247,.15);display:flex;align-items:center;gap:18px">
      <div style="width:80px;height:80px;background:linear-gradient(135deg,#ef4444,#ec4899);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0">❤️</div>
      <div><div style="font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:5px">Плейлист</div><div style="font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:-1px;margin-bottom:6px">Любимые треки</div><div style="font-size:12px;color:var(--text2)">${liked.length} треков</div></div>
    </div>
    ${liked.length ? `<div class="tracks">${liked.map((t,i)=>trackH(t,i,liked)).join('')}</div>` : `<div class="empty"><div class="empty-icon">❤️</div><div class="empty-title">Список пуст</div><div class="empty-sub">Нажми ❤️ на треке чтобы добавить</div></div>`}`;
  bindNav(); bindTracks(liked);
}

// BIND
function bindNav() {
  qsa('[data-page]').forEach(e => e.onclick = ()=>goTo(e.dataset.page));
}

function bindTracks(tracks) {
  qsa('.track').forEach(el => {
    el.onclick = e => {
      if (e.target.classList.contains('track-like')) return;
      const t = tracks.find(x=>x.id===+el.dataset.id);
      if (t) { if (!t.preview) { alert('У этого трека нет превью — только платные треки Deezer имеют полное воспроизведение'); return; } play(t, tracks); }
    };
  });
  qsa('.track-like').forEach(btn => {
    btn.onclick = e => { e.stopPropagation(); const t=tracks.find(x=>x.id===+btn.dataset.id); toggleLike(+btn.dataset.id,t); };
  });
}

function bindAlbums() {
  qsa('[data-aid]').forEach(el => {
    el.onclick = async () => {
      const tracks = await dzAlbumTracks(el.dataset.aid);
      const withPreview = tracks.filter(t=>t.preview);
      if (withPreview.length) play(withPreview[0], withPreview);
      else if (tracks.length) play(tracks[0], tracks);
    };
  });
}

// SIDEBAR
$('pl-sidebar').innerHTML = [{n:'Вечерняя атмосфера',e:'🌆',g:'linear-gradient(135deg,#f97316,#ef4444)'},{n:'Фокус и работа',e:'🎯',g:'linear-gradient(135deg,#3b82f6,#6366f1)'},{n:'Ночная поездка',e:'🌙',g:'linear-gradient(135deg,#8b5cf6,#4c1d95)'}].map(p=>`<div class="pl-item"><div class="pl-thumb" style="background:${p.g}">${p.e}</div><div><div class="pl-name">${p.n}</div></div></div>`).join('');

// PLAYER CONTROLS
$('btn-play').onclick = () => { if (!ST.track) return; if (!ST.track.preview) { alert('Нет превью'); return; } audio.paused ? audio.play() : audio.pause(); };
$('btn-next').onclick = next;
$('btn-prev').onclick = prev;
$('btn-shuffle').onclick = () => { ST.shuffle=!ST.shuffle; $('btn-shuffle').classList.toggle('on',ST.shuffle); };
$('btn-repeat').onclick = () => { ST.repeat=!ST.repeat; audio.loop=ST.repeat; $('btn-repeat').classList.toggle('on',ST.repeat); };
$('p-like').onclick = () => { if(ST.track) toggleLike(ST.track.id, ST.track); };
$('prog-bar').onclick = e => { if(!audio.duration) return; const r=e.currentTarget.getBoundingClientRect(); audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration; };
$('vol-bar').onclick = e => { const r=e.currentTarget.getBoundingClientRect(); ST.vol=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)); audio.volume=ST.vol; $('vol-fill').style.width=(ST.vol*100)+'%'; };
$('btn-mute').onclick = () => { ST.muted=!ST.muted; audio.muted=ST.muted; $('btn-mute').textContent=ST.muted?'🔇':'🔊'; };

render();
</script>
</body>
</html>
